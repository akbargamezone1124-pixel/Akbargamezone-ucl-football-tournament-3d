<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UCL Ultimate Tournament 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000428; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .ucl-gradient { background: linear-gradient(135deg, #000428 0%, #004e92 100%); }
        .ucl-border { border: 2px solid #d4af37; }
        .btn { pointer-events: auto; cursor: pointer; transition: all 0.2s; }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #d4af37; border-radius: 50%; box-shadow: 0 0 15px #d4af37; }
        #shoot-btn { position: absolute; bottom: 60px; right: 40px; width: 80px; height: 80px; background: #d4af37; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000428; pointer-events: auto; user-select: none; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none !important; }
        #tournament-ui { pointer-events: auto; max-height: 80vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; color: white; font-size: 0.8rem; }
        th, td { padding: 8px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .highlight { color: #d4af37; font-weight: bold; }
        #boss-warning { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); color: #ff0000; font-weight: 900; font-style: italic; font-size: 2rem; text-shadow: 0 0 10px #000; opacity: 0; transition: opacity 0.5s; z-index: 100; text-align: center; }
        #siuuu-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fbbf24; font-size: 8rem; font-weight: 900; font-style: italic; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .club-logo { width: 20px; height: 20px; object-fit: contain; vertical-align: middle; margin-right: 6px; display: inline-block; }
        .club-logo-large { width: 40px; height: 40px; object-fit: contain; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="boss-warning">PERINGATAN: BOSS TERDETEKSI<br>CRISTIANO RONALDO (REAL MADRID)</div>
    <div id="siuuu-msg">SIUUU!</div>

    <!-- Menu Utama -->
    <div id="main-menu" class="absolute inset-0 flex flex-col items-center justify-center ucl-gradient text-white z-50">
        <h1 class="text-5xl font-black italic mb-2 tracking-tighter">CHAMPIONS</h1>
        <h2 class="text-xl text-yellow-500 mb-8 tracking-widest uppercase">League Tournament</h2>
        <div class="mb-6 p-4 bg-white/5 rounded-xl border border-red-500/30 text-center">
            <p class="text-xs uppercase opacity-70 mb-1">Boss Lawan Tersedia</p>
            <p class="text-lg font-bold text-red-500">Cristiano Ronaldo (Real Madrid)</p>
        </div>
        <button id="start-btn" class="btn px-12 py-4 bg-yellow-500 text-blue-900 font-bold rounded-full text-xl shadow-lg">MULAI TURNAMEN</button>
        <button id="reset-btn" class="btn mt-4 text-sm opacity-60">Reset Progres</button>
    </div>

    <!-- UI Turnamen -->
    <div id="tournament-ui" class="absolute inset-x-4 top-10 mx-auto max-w-4xl ucl-gradient p-6 rounded-xl ucl-border text-white hidden z-40 shadow-2xl">
        <div id="tournament-content"></div>
        <div class="mt-6 flex justify-center">
            <button id="play-match-btn" class="btn px-8 py-3 bg-yellow-500 text-blue-900 font-bold rounded-full">MAIN PERTANDINGAN BERIKUTNYA</button>
        </div>
    </div>

    <!-- HUD Game -->
    <div id="game-hud" class="absolute top-5 inset-x-0 flex justify-center items-start hidden">
        <div class="ucl-gradient px-6 py-2 rounded-full ucl-border flex items-center gap-8 shadow-xl text-white">
            <div class="text-center flex flex-col items-center">
                <img id="logo-a" class="club-logo-large" src="" onerror="this.style.display='none'">
                <div id="team-a-name" class="text-xs uppercase opacity-70">TIM ANDA</div>
                <div id="score-a" class="text-2xl font-bold">0</div>
            </div>
            <div class="text-xl font-black text-yellow-500 italic">VS</div>
            <div class="text-center flex flex-col items-center">
                <img id="logo-b" class="club-logo-large" src="" onerror="this.style.display='none'">
                <div id="team-b-name" class="text-xs uppercase opacity-70">AI</div>
                <div id="score-b" class="text-2xl font-bold">0</div>
            </div>
            <div class="ml-4 border-l border-white/20 pl-4">
                <div id="game-timer" class="text-lg font-mono">00:45</div>
            </div>
        </div>
    </div>

    <!-- Kontrol Mobile -->
    <div id="mobile-controls" class="hidden">
        <div id="joystick-container"><div id="joystick-knob"></div></div>
        <div id="shoot-btn" class="btn shadow-2xl">SHOOT</div>
    </div>

    <!-- Overlay Akhir Match -->
    <div id="match-end-overlay" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center text-white hidden z-50">
        <h2 class="text-4xl font-bold mb-2">WAKTU HABIS</h2>
        <p id="match-result-text" class="text-xl mb-8 flex items-center gap-4"></p>
        <button id="back-to-tournament-btn" class="btn px-8 py-3 bg-yellow-500 text-blue-900 font-bold rounded-full">KEMBALI KE TURNAMEN</button>
    </div>
</div>

<script>
/** * DATA & STATE */
const TEAMS = [
    "Real Madrid", "Man City", "Bayern", "PSG", "Liverpool", "Inter", "Barcelona", "Arsenal",
    "Dortmund", "Atletico", "AC Milan", "Napoli", "Benfica", "Porto", "Ajax", "Leipzig",
    "Juventus", "Chelsea", "Man Utd", "Leverkusen", "Lazio", "PSV", "Feyenoord", "Marseille",
    "Celtic", "Galatasaray", "Shakhtar", "Salzburg", "Crvena Zvezda", "Young Boys", "Antwerp", "Lens"
];

// =====================================================
// TEAM COLORS - Jersey, shorts, socks per club
// =====================================================
const TEAM_COLORS_MAP = {

    "Inter":          { jersey: 0x0000CD, shorts: 0x000000, socks: 0x0000CD, accent: 0x000000 },
    "Barcelona":      { jersey: 0xA50044, shorts: 0x004D98, socks: 0xA50044, accent: 0xffd700 },

function getTeamColors(teamName) {
    return TEAM_COLORS_MAP[teamName] || { jersey: 0x333333, shorts: 0x111111, socks: 0xffffff, accent: 0xffffff };
}

// Helper para logo Wikipedia
const LOGO_MAP = {
    "Real Madrid": "Real_Madrid_CF.svg",
    "Man City": "Manchester_City_FC_badge.svg",
    "Bayern": "FC_Bayern_München_logo_(2017).svg",
    "PSG": "Paris_Saint-Germain_F.C..svg",
    "Liverpool": "Liverpool_FC.svg",
    "Inter": "Inter_Milan_2021_logo.svg",
    "Barcelona": "FC_Barcelona_(crest).svg",
    "Arsenal": "Arsenal_FC.svg",
    "Dortmund": "BVB_logo.svg",
    "Atletico": "Atletico_Madrid_2017_logo.svg",
    "AC Milan": "A.C._Milan_logo.svg",
    "Napoli": "S.S.C._Napoli_logo.svg",
    "Benfica": "SL_Benfica_logo.svg",
    "Porto": "FC_Porto.svg",
    "Ajax": "AFC_Ajax_logo.svg",
    "Leipzig": "RB_Leipzig_2014_logo.svg",
    "Juventus": "Juventus_FC_2017_icon_(black).svg",
    "Chelsea": "Chelsea_FC.svg",
    "Man Utd": "Manchester_United_FC_crest.svg",
    "Leverkusen": "Bayer_04_Leverkusen_logo.svg",
    "Lazio": "S.S._Lazio_logo.svg",
    "PSV": "PSV_Eindhoven_logo.svg",
    "Feyenoord": "Feyenoord_logo.svg",
    "Marseille": "Olympique_de_Marseille_logo.svg",
    "Celtic": "Celtic_FC_crest.svg",
    "Galatasaray": "Galatasaray_Sports_Club_Logo.svg",
    "Shakhtar": "FC_Shakhtar_Donetsk.svg",
    "Salzburg": "FC_Red_Bull_Salzburg_logo.svg",
    "Crvena Zvezda": "FK_Red_Star_Belgrade_logo.svg",
    "Young Boys": "BSC_Young_Boys_logo.svg",
    "Antwerp": "Royal_Antwerp_FC_logo.svg",
    "Lens": "RC_Lens_logo.svg"
};

function getTeamLogo(name) {
    const fileName = LOGO_MAP[name] || name.replace(/ /g, '_') + '_logo.svg';
    return `https://en.wikipedia.org/wiki/Special:FilePath/File:${fileName}`;
}

let gameState = {
    phase: 'GROUP',
    groups: [],
    playerTeam: "Barcelona",
    knockout: { quarter: [], semi: [], final: [] }
};
let currentOpponentTeam = "Real Madrid";

/** * LOGIKA TURNAMEN */
function initTournament() {
    const saved = localStorage.getItem('ucl_tournament_save');
    if (saved) {
        gameState = JSON.parse(saved);
        if (!gameState.knockout) gameState.knockout = { quarter: [], semi: [], final: [] };
        return;
    }
    const shuffled = [...TEAMS].sort(() => Math.random() - 0.5);
    gameState.groups = [];
    for (let i = 0; i < 8; i++) {
        const groupTeams = shuffled.slice(i * 4, i * 4 + 4).map(name => ({
            name, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, pts: 0
        }));
        gameState.groups.push({ letter: String.fromCharCode(65 + i), teams: groupTeams });
    }
    saveGame();
}

function saveGame() { localStorage.setItem('ucl_tournament_save', JSON.stringify(gameState)); }

function renderTournamentUI() {
    const container = document.getElementById('tournament-content');
    let html = '';
    if (gameState.phase === 'GROUP') {
        html = '<h2 class="text-2xl font-bold mb-4 text-center">FASE GRUP</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
        gameState.groups.forEach(group => {
            html += `<div class="bg-black/30 p-3 rounded border border-white/10">
                <h3 class="font-bold text-yellow-500 mb-2">GRUP ${group.letter}</h3>
                <table><thead><tr><th>TIM</th><th>P</th><th>GD</th><th>PTS</th></tr></thead><tbody>
                ${group.teams.sort((a,b) => b.pts - a.pts || (b.gf-b.ga) - (a.gf-a.ga)).map(t => `
                    <tr class="${t.name === gameState.playerTeam ? 'highlight' : ''}">
                        <td class="text-left flex items-center">
                            <img class="club-logo" src="${getTeamLogo(t.name)}" onerror="this.style.display='none'">
                            ${t.name}
                        </td>
                        <td>${t.p}</td><td>${t.gf - t.ga}</td><td>${t.pts}</td>
                    </tr>`).join('')}
                </tbody></table></div>`;
        });
        html += '</div>';
    } else if (gameState.phase !== 'WINNER') {
        const title = gameState.phase === 'QUARTER' ? 'PEREMPAT FINAL' : (gameState.phase === 'SEMI' ? 'SEMI FINAL' : 'FINAL');
        html = `<h2 class="text-2xl font-bold mb-4 text-center uppercase">${title}</h2>`;
        const matches = gameState.knockout[gameState.phase.toLowerCase()] || [];
        html += '<div class="flex flex-col gap-4 items-center">';
        matches.forEach(m => {
            const isPlayed = m.scoreH !== null;
            html += `<div class="bg-white/10 p-4 rounded-xl w-full max-w-md flex justify-between items-center ucl-border ${isPlayed ? 'opacity-50' : ''}">
                <span class="w-1/3 text-left flex items-center ${m.home === gameState.playerTeam ? 'highlight' : ''}">
                    <img class="club-logo" src="${getTeamLogo(m.home)}" onerror="this.style.display='none'">${m.home}
                </span>
                <span class="w-1/3 text-center text-xl font-black">${isPlayed ? m.scoreH + ' - ' + m.scoreV : 'VS'}</span>
                <span class="w-1/3 text-right flex items-center justify-end ${m.away === gameState.playerTeam ? 'highlight' : ''}">
                    ${m.away}
                    <img class="club-logo" style="margin-right:0; margin-left:6px;" src="${getTeamLogo(m.away)}" onerror="this.style.display='none'">
                </span>
            </div>`;
        });
        html += '</div>';
    } else {
        html = `<div class="text-center py-10"><h2 class="text-4xl font-bold text-yellow-500 mb-4">🏆 CHAMPIONS!</h2><p>Selamat, ${gameState.playerTeam} telah memenangkan turnamen!</p></div>`;
    }
    container.innerHTML = html;
}

/** * THREE.JS ENGINE */
let scene, camera, renderer, ball, player, opponent;
let isPlaying = false;
let moveDir = new THREE.Vector2(0, 0);
let gameTime = 45;
let score = { h: 0, v: 0 };
let clock = new THREE.Clock();
let ballVelocity = new THREE.Vector3();
let aiVelocity = new THREE.Vector3();
let playerVelocity = new THREE.Vector3();
let aiShootCooldown = 0;
let disableDribbleFrames = 0;
let isBossMatch = false;

// Celebration state
let celebrationTimer = 0;
let celebrationChar = null;

function init3D() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000428);
    scene.fog = new THREE.Fog(0x000428, 25, 110);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 20);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0x4466aa, 0.7));
    const sun = new THREE.DirectionalLight(0xfff5e0, 1.0);
    sun.position.set(10, 30, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    scene.add(sun);

    const spot1 = new THREE.SpotLight(0xffffff, 0.8);
    spot1.position.set(-15, 40, 0);
    spot1.castShadow = false;
    scene.add(spot1);
    const spot2 = new THREE.SpotLight(0xffffff, 0.8);
    spot2.position.set(15, 40, 0);
    scene.add(spot2);

    // Pitch - green with stripes
    buildPitch();

    // Goals
    createGoal(-30);
    createGoal(30);

    // Ball - detailed with texture
    const ballGeo = new THREE.SphereGeometry(0.45, 24, 24);
    const ballMat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 80 });
    ball = new THREE.Mesh(ballGeo, ballMat);
    ball.castShadow = true;
    // Pentagon patches on ball
    const patchMat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 60 });
    const patchPositions = [
        [0, 0.45, 0], [0, -0.45, 0],
        [0.3, 0.33, 0.2], [-0.3, 0.33, 0.2],
        [0.3, -0.33, -0.2], [-0.3, -0.33, -0.2],
        [0.45, 0, 0], [-0.45, 0, 0]
    ];
    patchPositions.forEach(pos => {
        const patch = new THREE.Mesh(new THREE.CircleGeometry(0.13, 5), patchMat);
        patch.position.set(pos[0], pos[1], pos[2]);
        patch.lookAt(pos[0] * 2, pos[1] * 2, pos[2] * 2);
        ball.add(patch);
    });
    scene.add(ball);

    // Create player and opponent
    player = createChar(gameState.playerTeam, false, false);
    opponent = createChar("Real Madrid", false, false);

    resetPositions();
    animate();
}

// =====================================================
// PITCH BUILDER
// =====================================================
function buildPitch() {
    // Main grass
    const pitch = new THREE.Mesh(
        new THREE.PlaneGeometry(40, 60),
        new THREE.MeshPhongMaterial({ color: 0x1a5e2a, shininess: 10 })
    );
    pitch.rotation.x = -Math.PI / 2;
    pitch.receiveShadow = true;
    scene.add(pitch);

    // Alternating grass stripes
    for (let i = 0; i < 10; i++) {
        const stripe = new THREE.Mesh(
            new THREE.PlaneGeometry(40, 6),
            new THREE.MeshPhongMaterial({ color: i % 2 === 0 ? 0x1d6630 : 0x176024, transparent: true, opacity: 0.5 })
        );
        stripe.rotation.x = -Math.PI / 2;
        stripe.position.set(0, 0.01, -27 + i * 6);
        scene.add(stripe);
    }

    // Field lines
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
    const createLine = (w, h, x, z, ry = 0) => {
        const l = new THREE.Mesh(new THREE.PlaneGeometry(w, h), lineMat);
        l.rotation.x = -Math.PI / 2;
        l.rotation.z = ry;
        l.position.set(x, 0.02, z);
        scene.add(l);
    };
    // Center line
    createLine(40, 0.2, 0, 0);
    // Center circle
    const circleGeo = new THREE.RingGeometry(4.9, 5.1, 48);
    const circle = new THREE.Mesh(circleGeo, lineMat);
    circle.rotation.x = -Math.PI / 2;
    circle.position.set(0, 0.02, 0);
    scene.add(circle);
    // Center dot
    const dot = new THREE.Mesh(new THREE.CircleGeometry(0.25, 16), lineMat);
    dot.rotation.x = -Math.PI / 2;
    dot.position.set(0, 0.02, 0);
    scene.add(dot);
    // Touchlines
    createLine(0.2, 60, -20, 0);
    createLine(0.2, 60, 20, 0);
    // Goal lines
    createLine(40, 0.2, 0, -30);
    createLine(40, 0.2, 0, 30);
    // Penalty areas
    createLine(22, 0.2, 0, -20.5);
    createLine(0.2, 9.5, -11, -25.25);
    createLine(0.2, 9.5, 11, -25.25);
    createLine(22, 0.2, 0, 20.5);
    createLine(0.2, 9.5, -11, 25.25);
    createLine(0.2, 9.5, 11, 25.25);
    // Goal areas
    createLine(13, 0.2, 0, -24);
    createLine(0.2, 6, -6.5, -27);
    createLine(0.2, 6, 6.5, -27);
    createLine(13, 0.2, 0, 24);
    createLine(0.2, 6, -6.5, 27);
    createLine(0.2, 6, 6.5, 27);
}

// =====================================================
// GOAL BUILDER
// =====================================================
function createGoal(z) {
    const g = new THREE.Group();
    const postMat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 120 });
    const netMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15, wireframe: true });

    const postGeo = new THREE.CylinderGeometry(0.12, 0.12, 4.5);
    const p1 = new THREE.Mesh(postGeo, postMat); p1.position.set(-5, 2.25, 0); p1.castShadow = true;
    const p2 = new THREE.Mesh(postGeo, postMat); p2.position.set(5, 2.25, 0); p2.castShadow = true;
    const crossGeo = new THREE.CylinderGeometry(0.12, 0.12, 10.24);
    const cross = new THREE.Mesh(crossGeo, postMat);
    cross.rotation.z = Math.PI / 2;
    cross.position.set(0, 4.5, 0);
    cross.castShadow = true;

    // Net
    const net = new THREE.Mesh(new THREE.BoxGeometry(10, 4.5, 2.5), netMat);
    const netDepth = z < 0 ? 1.25 : -1.25;
    net.position.set(0, 2.25, netDepth);

    g.add(p1, p2, cross, net);
    g.position.z = z;
    scene.add(g);
}

// =====================================================
// SUPER DETAILED CHARACTER CREATION
// =====================================================
function makeNumberTexture(number, jerseyColor, accentColor) {
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    // Transparent background
    ctx.clearRect(0, 0, 128, 128);
    // Number color: if jersey is bright, use dark number; otherwise white
    const brightness = ((jerseyColor >> 16) & 0xff) * 0.299 +
                       ((jerseyColor >> 8) & 0xff) * 0.587 +
                       (jerseyColor & 0xff) * 0.114;
    const textColor = brightness > 128 ? '#000000' : '#ffffff';
    ctx.fillStyle = textColor;
    ctx.font = 'bold 72px Arial Black, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = brightness > 128 ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 4;
    ctx.fillText(number.toString(), 64, 64);
    return new THREE.CanvasTexture(canvas);
}

function createChar(teamName, isBoss = false, isPlayerTeam = true) {
    const g = new THREE.Group();
    const colors = getTeamColors(teamName);

    // Randomized physical traits
    const skinTones = [0xffe0c2, 0xf1c27d, 0xd4956a, 0xc08045, 0x8d5524, 0x6b3a2a];
    const skinColor = isBoss ? 0xd4956a : skinTones[Math.floor(Math.random() * skinTones.length)];
    const hairColors = [0x1a0800, 0x4a2800, 0x8b4513, 0xffd700, 0x000000, 0x2c1810];
    const hairColor = isBoss ? 0x1a0800 : hairColors[Math.floor(Math.random() * hairColors.length)];
    const hairStyle = isBoss ? 0 : Math.floor(Math.random() * 4); // 0=short, 1=afro, 2=sides, 3=buzz
    const bodyScale = isBoss ? 1.15 : (0.88 + Math.random() * 0.22);
    const buildWide = isBoss ? 1.08 : (0.85 + Math.random() * 0.25); // shoulder width
    const jerseyNum = isBoss ? 7 : Math.floor(Math.random() * 25) + 2;

    // Materials
    const skinMat = new THREE.MeshPhongMaterial({ color: skinColor, shininess: 30 });
    const jerseyMat = new THREE.MeshPhongMaterial({ color: colors.jersey, shininess: 50 });
    const shortsMat = new THREE.MeshPhongMaterial({ color: colors.shorts, shininess: 30 });
    const socksMat = new THREE.MeshPhongMaterial({ color: colors.socks, shininess: 20 });
    const shoesMat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 80 });
    const hairMat = new THREE.MeshPhongMaterial({ color: hairColor, shininess: 15 });
    const darkMat = new THREE.MeshPhongMaterial({ color: 0x1a1a1a });
    const whiteMat = new THREE.MeshPhongMaterial({ color: 0xffffff });

    g.scale.set(buildWide, bodyScale, 1);

    // --- TORSO ---
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.95, 1.1, 0.55), jerseyMat);
    torso.position.y = 1.55;
    torso.castShadow = true;
    g.add(torso);

    // Jersey accent stripe (collar area)
    const collarMat = new THREE.MeshPhongMaterial({ color: colors.accent, shininess: 60 });
    const collar = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.12, 12), collarMat);
    collar.position.y = 2.13;
    g.add(collar);

    // Jersey number (back)
    const numTex = makeNumberTexture(jerseyNum, colors.jersey, colors.accent);
    const numPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(0.45, 0.38),
        new THREE.MeshBasicMaterial({ map: numTex, transparent: true, depthWrite: false })
    );
    numPlane.position.set(0, 1.6, -0.29);
    numPlane.rotation.y = Math.PI;
    g.add(numPlane);

    // --- SHORTS ---
    const shorts = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.38, 0.58), shortsMat);
    shorts.position.y = 0.99;
    g.add(shorts);

    // --- NECK ---
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.16, 0.22, 10), skinMat);
    neck.position.y = 2.21;
    g.add(neck);

    // --- HEAD GROUP ---
    const headGroup = new THREE.Group();
    headGroup.position.y = 2.55;
    headGroup.userData.baseY = 2.55;

    // Head shape - slightly oval
    const headGeo = new THREE.SphereGeometry(0.38, 20, 20);
    const head = new THREE.Mesh(headGeo, skinMat);
    head.scale.y = isBoss ? 1.08 : (0.94 + Math.random() * 0.14);
    head.scale.x = isBoss ? 0.96 : (0.88 + Math.random() * 0.14);
    headGroup.add(head);

    // Eyes - white + iris + pupil
    [[-0.14, 1], [0.14, -1]].forEach(([ex, side]) => {
        const eyeWhite = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 10), whiteMat);
        eyeWhite.position.set(ex, 0.05, 0.33);
        eyeWhite.scale.z = 0.5;
        headGroup.add(eyeWhite);

        // Iris
        const irisColor = [0x3d2200, 0x1a3a5c, 0x1a4d1a][Math.floor(Math.random() * 3)];
        const irisMat = new THREE.MeshPhongMaterial({ color: irisColor });
        const iris = new THREE.Mesh(new THREE.CircleGeometry(0.055, 10), irisMat);
        iris.position.set(ex, 0.05, 0.37);
        headGroup.add(iris);

        // Pupil
        const pupil = new THREE.Mesh(new THREE.CircleGeometry(0.03, 8), darkMat);
        pupil.position.set(ex, 0.05, 0.371);
        headGroup.add(pupil);

        // Eye shine
        const shineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const shine = new THREE.Mesh(new THREE.CircleGeometry(0.012, 6), shineMat);
        shine.position.set(ex + 0.015, 0.065, 0.372);
        headGroup.add(shine);
    });

    // Eyebrows
    const browMat = new THREE.MeshPhongMaterial({ color: hairColor });
    const browAngle = isBoss ? -0.15 : (-0.25 + Math.random() * 0.25);
    [[-0.14, 1], [0.14, -1]].forEach(([bx, side]) => {
        const brow = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.028, 0.04), browMat);
        brow.position.set(bx, 0.17, 0.31);
        brow.rotation.z = side * browAngle;
        headGroup.add(brow);
    });

    // Nose
    const noseScale = 0.85 + Math.random() * 0.3;
    const nose = new THREE.Mesh(new THREE.SphereGeometry(0.038, 8, 8), skinMat);
    nose.scale.set(noseScale, 1, noseScale);
    nose.position.set(0, -0.02, 0.37);
    headGroup.add(nose);

    // Nostrils
    [-0.025, 0.025].forEach(nx => {
        const nostril = new THREE.Mesh(new THREE.CircleGeometry(0.015, 6), darkMat);
        nostril.position.set(nx, -0.045, 0.38);
        nostril.rotation.x = -0.4;
        headGroup.add(nostril);
    });

    // Lips / Mouth
    const lipColor = skinColor < 0xb06040 ? 0x8b3a3a : 0x7a3030;
    const lipMat = new THREE.MeshPhongMaterial({ color: lipColor });
    const upperLip = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.025, 0.04), lipMat);
    upperLip.position.set(0, -0.115, 0.345);
    headGroup.add(upperLip);
    const lowerLip = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.028, 0.04), lipMat);
    lowerLip.position.set(0, -0.145, 0.345);
    headGroup.add(lowerLip);

    // Ears
    [-0.38, 0.38].forEach(ex => {
        const ear = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), skinMat);
        ear.scale.z = 0.4;
        ear.position.set(ex, 0.0, 0.0);
        headGroup.add(ear);
    });

    // Chin/jaw enhancement for boss
    if (isBoss) {
        const jaw = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.09, 0.38), skinMat);
        jaw.position.y = -0.3;
        headGroup.add(jaw);
        // CR7 stubble
        const stubbleMat = new THREE.MeshPhongMaterial({ color: 0x3d1f00, transparent: true, opacity: 0.4 });
        const stubble = new THREE.Mesh(new THREE.SphereGeometry(0.37, 12, 6, 0, Math.PI * 2, Math.PI * 0.6, Math.PI * 0.4), stubbleMat);
        stubble.position.y = -0.18;
        headGroup.add(stubble);
    }

    // Hair styles
    if (hairStyle === 0 || isBoss) {
        // Short / swept back
        const hairCap = new THREE.Mesh(
            new THREE.SphereGeometry(0.38, 16, 10, 0, Math.PI * 2, 0, Math.PI * 0.42),
            hairMat
        );
        hairCap.position.y = 0.05;
        headGroup.add(hairCap);
        if (isBoss) {
            // CR7 styled wave at front
            const wave = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.06, 6, 12, Math.PI), hairMat);
            wave.position.set(0, 0.3, 0.22);
            wave.rotation.x = 0.5;
            headGroup.add(wave);
        }
    } else if (hairStyle === 1) {
        // Afro / curly
        const afro = new THREE.Mesh(new THREE.SphereGeometry(0.44, 14, 14), hairMat);
        afro.position.y = 0.12;
        afro.scale.set(1.0, 0.72, 1.0);
        headGroup.add(afro);
        // Texture bumps
        for (let i = 0; i < 8; i++) {
            const bump = new THREE.Mesh(new THREE.SphereGeometry(0.09, 6, 6), hairMat);
            const angle = (i / 8) * Math.PI * 2;
            bump.position.set(Math.cos(angle) * 0.35, 0.22 + Math.abs(Math.sin(angle)) * 0.1, Math.sin(angle) * 0.35);
            headGroup.add(bump);
        }
    } else if (hairStyle === 2) {
        // Long sides + top
        const hairTop = new THREE.Mesh(
            new THREE.SphereGeometry(0.39, 16, 10, 0, Math.PI * 2, 0, Math.PI * 0.48),
            hairMat
        );
        hairTop.position.y = 0.03;
        headGroup.add(hairTop);
        // Side panels
        [-0.34, 0.34].forEach(sx => {
            const side = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.32, 0.38), hairMat);
            side.position.set(sx, -0.08, 0.0);
            headGroup.add(side);
        });
        // Back hair
        const back = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.28, 0.1), hairMat);
        back.position.set(0, -0.1, -0.35);
        headGroup.add(back);
    } else {
        // Buzz cut
        const buzz = new THREE.Mesh(
            new THREE.SphereGeometry(0.385, 14, 10, 0, Math.PI * 2, 0, Math.PI * 0.38),

        );

    // --- ARMS ---
    const createArm = (side) => {

        armGroup.userData.baseRot = 0;

        // Upper arm
        const upperArm = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.11, 0.47), jerseyMat);

        upperArm.castShadow = true;

        // Elbow group (pivot at elbow)

        elbowGroup.position.y = -0.47;

        const lowerArm = new THREE.Mesh(new THREE.CylinderGeometry(0.10, 0.085, 0.42), skinMat);
        lowerArm.position.y = -0.21;

        // Hand
        const hand = new THREE.Mesh(new THREE.SphereGeometry(0.092, 10, 10), skinMat);
        hand.position.y = -0.44;
        elbowGroup.add(hand);

        armGroup.add(elbowGroup);
        armGroup.userData.elbowGroup = elbowGroup;
        g.add(armGroup);

    };

    const leftArm = createArm(-1);
    const rightArm = createArm(1);

    // --- LEGS ---
    const createLeg = (side) => {
        const legGroup = new THREE.Group();
        legGroup.position.set(side * 0.27, 1.0, 0);

        // Thigh
        const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.19, 0.155, 0.58), shortsMat);
        thigh.position.y = -0.29;
        thigh.castShadow = true;
        legGroup.add(thigh);

        // Knee group
        const kneeGroup = new THREE.Group();
        kneeGroup.position.y = -0.58;

        // Shin guard hint
        const shinGuardMat = new THREE.MeshPhongMaterial({ color: 0xdddddd });
        const shinGuard = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.22, 0.1), shinGuardMat);
        shinGuard.position.set(0, -0.18, 0.1);
        kneeGroup.add(shinGuard);

        // Shin / sock
        const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.135, 0.105, 0.52), socksMat);
        shin.position.y = -0.26;
        shin.castShadow = true;
        kneeGroup.add(shin);

        // Shoe - more detailed
        const shoeGroup = new THREE.Group();
        shoeGroup.position.y = -0.56;
        const shoeMain = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.13, 0.42), shoesMat);
        shoeMain.position.set(0, 0, 0.05);
        const shoeTip = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.1), shoesMat);
        shoeTip.position.set(0, 0.01, 0.27);
        const shoeHeel = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.12, 0.1), shoesMat);
        shoeHeel.position.set(0, 0.0, -0.2);
        // Shoe accent stripe
        const stripeCol = Math.random() > 0.5 ? 0xffffff : colors.accent;
        const stripeMat = new THREE.MeshPhongMaterial({ color: stripeCol });
        const stripe1 = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.025, 0.01), stripeMat);
        stripe1.position.set(0, 0.06, 0.2);
        stripe1.rotation.y = 0;
        shoeGroup.add(shoeMain, shoeTip, shoeHeel, stripe1);
        shoeGroup.castShadow = true;
        kneeGroup.add(shoeGroup);

        legGroup.add(kneeGroup);
        legGroup.userData.kneeGroup = kneeGroup;
        legGroup.castShadow = true;
        g.add(legGroup);
        return legGroup;
    };

    const leftLeg = createLeg(-1);
    const rightLeg = createLeg(1);

    // Store animation handles on group
    g.userData.leftLeg = leftLeg;
    g.userData.rightLeg = rightLeg;
    g.userData.leftArm = leftArm;
    g.userData.rightArm = rightArm;
    g.userData.headGroup = headGroup;
    g.userData.animTime = Math.random() * Math.PI * 2;
    g.userData.celebrationMode = false;
    g.userData.celebrationTime = 0;
    g.userData.isBoss = isBoss;
    g.userData.idleBob = Math.random() * Math.PI * 2;

    scene.add(g);
    return g;
}

function updateCharacterAnimation(charGroup, velocity, dt) {
    if (!charGroup.userData.leftLeg) return;

    const speed = velocity.length();
    const ud = charGroup.userData;
    ud.animTime += Math.max(speed * 14.0, 1.2) * dt;
    ud.idleBob += dt * 1.5;

    const t = ud.animTime;
    const swingAmt = Math.min(speed * 18.0, 0.75);

    // --- Running leg animation ---
    ud.leftLeg.rotation.x = Math.sin(t) * swingAmt;
    ud.rightLeg.rotation.x = Math.sin(t + Math.PI) * swingAmt;

    // Knee bend on back-swing leg
    const lKnee = Math.max(0, Math.sin(t + Math.PI) * swingAmt * 0.7);
    const rKnee = Math.max(0, Math.sin(t) * swingAmt * 0.7);
    ud.leftLeg.userData.kneeGroup.rotation.x = lKnee;
    ud.rightLeg.userData.kneeGroup.rotation.x = rKnee;

    // Arm swing opposite to leg
    ud.leftArm.rotation.x = Math.sin(t + Math.PI) * swingAmt * 0.55;
    ud.rightArm.rotation.x = Math.sin(t) * swingAmt * 0.55;

    // Slight arm outward when running
    ud.leftArm.rotation.z = -0.1 - speed * 0.3;
    ud.rightArm.rotation.z = 0.1 + speed * 0.3;

    // Elbow bend on back swing
    ud.leftArm.userData.elbowGroup.rotation.x = Math.max(0, Math.sin(t) * 0.4 * Math.min(speed * 8, 1));
    ud.rightArm.userData.elbowGroup.rotation.x = Math.max(0, Math.sin(t + Math.PI) * 0.4 * Math.min(speed * 8, 1));

    // Body lean forward when sprinting
    const bodyLean = speed * 0.8;
    charGroup.children.forEach(c => {
        if (c.geometry && c.geometry.type === 'BoxGeometry' && c.position.y > 1.4 && c.position.y < 1.8) {
            // torso lean
        }
    });

    // Head idle bob
    ud.headGroup.position.y = ud.headGroup.userData.baseY + Math.sin(ud.idleBob) * 0.02;

    // Celebration animation
    if (ud.celebrationMode) {
        ud.celebrationTime += dt;
        const ct = ud.celebrationTime;
        // Arms up!
        ud.leftArm.rotation.x = -1.8 + Math.sin(ct * 4) * 0.3;
        ud.rightArm.rotation.x = -1.8 + Math.sin(ct * 4 + 1) * 0.3;
        ud.leftArm.rotation.z = -0.8;
        ud.rightArm.rotation.z = 0.8;
        // Jump bob
        charGroup.position.y = Math.max(0, Math.sin(ct * 6) * 0.4);
        // Head look up
        ud.headGroup.rotation.x = -0.4;

        if (ud.celebrationTime > 1.8) {
            ud.celebrationMode = false;
            ud.celebrationTime = 0;
            charGroup.position.y = 0;
            ud.headGroup.rotation.x = 0;
        }
    }
}

function triggerCelebration(charGroup) {
    charGroup.userData.celebrationMode = true;
    charGroup.userData.celebrationTime = 0;
}

function resetPositions() {
    player.position.set(0, 0, 10);
    player.rotation.y = 0;
    opponent.position.set(0, 0, -10);
    opponent.rotation.y = Math.PI;
    aiVelocity.set(0, 0, 0);
    playerVelocity.set(0, 0, 0);
    moveDir.set(0, 0);
    ball.position.set(0, 0.45, 0);
    ballVelocity.set(0, 0, 0);
    aiShootCooldown = 0;
    disableDribbleFrames = 0;
}

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    if (isPlaying) {
        updatePlayer(dt);
        updateAI(dt);
        updateBall(dt);
        checkGoals();

        // Update character animations
        updateCharacterAnimation(player, playerVelocity, dt);
        updateCharacterAnimation(opponent, aiVelocity, dt);

        const targetCamPos = new THREE.Vector3(
            player.position.x * 0.8,
            12,
            player.position.z + 15
        );
        camera.position.lerp(targetCamPos, 0.08);

        const lookTarget = new THREE.Vector3().lerpVectors(player.position, ball.position, 0.4);
        camera.lookAt(lookTarget.x, 1, lookTarget.z);

        gameTime -= dt;
        if (gameTime <= 0) endGame();
        document.getElementById('game-timer').innerText = `00:${Math.max(0, Math.ceil(gameTime)).toString().padStart(2, '0')}`;
    }
    renderer.render(scene, camera);
}

function updatePlayer(dt) {
    const targetVel = new THREE.Vector3(moveDir.x * 0.25, 0, moveDir.y * 0.25);
    playerVelocity.lerp(targetVel, 0.2);
    player.position.add(playerVelocity);

    if (moveDir.length() > 0.1) {
        const angle = Math.atan2(moveDir.x, moveDir.y);
        player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, angle, 0.2);
    }

    player.position.x = Math.max(-19, Math.min(19, player.position.x));
    player.position.z = Math.max(-29, Math.min(29, player.position.z));

    if (disableDribbleFrames > 0) { disableDribbleFrames--; return; }

    const distBall = player.position.distanceTo(ball.position);
    if (distBall < 2.0) {
        const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(player.quaternion);
        if (distBall < 1.3) {
            const idealPos = player.position.clone().add(forward.multiplyScalar(1.2));
            ball.position.lerp(idealPos, 0.3);
            ballVelocity.copy(playerVelocity).multiplyScalar(0.9);
        }
    }
}

function updateAI(dt) {
    const aiPos = opponent.position;
    const ballPos = ball.position;
    const playerPos = player.position;
    const distBall = aiPos.distanceTo(ballPos);
    const distPlayer = aiPos.distanceTo(playerPos);
    const goalTarget = new THREE.Vector3(0, 0, 30);

    if (aiShootCooldown > 0) aiShootCooldown -= dt;

    let target = new THREE.Vector3();
    let baseSpeed = isBossMatch ? 0.25 : 0.17;
    let acceleration = isBossMatch ? 0.35 : 0.15;

    if (isBossMatch && gameTime < 15) baseSpeed *= 1.15;

    const playerHasBall = playerPos.distanceTo(ballPos) < 2.2;

    if (playerHasBall && distPlayer < 5) {
        const playerForward = new THREE.Vector3(0, 0, 1).applyQuaternion(player.quaternion);
        const playerRight = new THREE.Vector3().crossVectors(playerForward, new THREE.Vector3(0, 1, 0)).normalize();
        const offsetSide = aiPos.x < playerPos.x ? -2.5 : 2.5;
        target.copy(ballPos).add(playerRight.multiplyScalar(offsetSide));
        if (distBall < 3) { target.copy(ballPos); baseSpeed *= 1.2; }
    } else if (distBall > 1.8) {
        if (ballPos.z < -10) {
            target.copy(ballPos);
        } else {
            const behindBall = new THREE.Vector3().subVectors(ballPos, goalTarget).normalize();
            target.copy(ballPos).add(behindBall.multiplyScalar(2.0));
        }
        if (isBossMatch && distBall < 7) {
            target.x += Math.cos(Date.now() * 0.005) * 1.5;
        }
    } else {
        target.copy(goalTarget);
        if (isBossMatch) baseSpeed *= 1.25;
        if (aiPos.z > 6 && aiShootCooldown <= 0) {
            const power = isBossMatch ? 1.7 : 1.1;
            shootBall(opponent, new THREE.Vector3((Math.random() - 0.5) * 8, 0, 32), power);
            aiShootCooldown = isBossMatch ? 2.5 : 4.5;
        }
    }

    const direction = new THREE.Vector3().subVectors(target, aiPos).normalize();
    const desiredVel = direction.multiplyScalar(baseSpeed);
    aiVelocity.lerp(desiredVel, acceleration);
    aiPos.add(aiVelocity);

    if (distBall < 2.0) {
        const pushForce = new THREE.Vector3().subVectors(goalTarget, aiPos).normalize();
        const factor = isBossMatch ? 0.09 : 0.05;
        ballVelocity.add(pushForce.multiplyScalar(factor));
        if (playerHasBall && Math.random() < (isBossMatch ? 0.1 : 0.03)) {
            disableDribbleFrames = 10;
        }
    }

    if (aiVelocity.length() > 0.01) {
        const angle = Math.atan2(aiVelocity.x, aiVelocity.z);
        opponent.rotation.y = THREE.MathUtils.lerp(opponent.rotation.y, angle, 0.15);
    }
    aiPos.x = Math.max(-19, Math.min(19, aiPos.x));
    aiPos.z = Math.max(-29, Math.min(29, aiPos.z));
}

function updateBall(dt) {
    ballVelocity.multiplyScalar(0.97);
    ball.position.add(ballVelocity);
    if (Math.abs(ball.position.x) > 19.5) {
        ballVelocity.x *= -0.7;
        ball.position.x = Math.sign(ball.position.x) * 19.4;
    }
    if (Math.abs(ball.position.z) > 29.5 && Math.abs(ball.position.x) > 5.5) {
        ballVelocity.z *= -0.7;
        ball.position.z = Math.sign(ball.position.z) * 29.4;
    }
    ball.rotation.x += ballVelocity.z * 0.5;
    ball.rotation.z -= ballVelocity.x * 0.5;
    // Keep ball on ground unless kicked
    ball.position.y = Math.max(0.45, ball.position.y - 0.05);
}

function shootBall(from, targetPos, power = 1.0) {
    const dir = new THREE.Vector3().subVectors(targetPos, from.position).normalize();
    ballVelocity.copy(dir.multiplyScalar(power));
    ballVelocity.y = 0.12;
}

function checkGoals() {
    if (ball.position.z < -30) {
        score.h++;
        triggerCelebration(player);
        resetPositions();
        updateScoreUI();
        showGoalMsg("GOAL! ⚽");
    } else if (ball.position.z > 30) {
        score.v++;
        triggerCelebration(opponent);
        resetPositions();
        updateScoreUI();
        if (isBossMatch) { showSiuuu(); } else { showGoalMsg("KEBOBOLAN!"); }
    }
}

function showSiuuu() {
    const el = document.getElementById('siuuu-msg');
    el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 1500);
}

function showGoalMsg(txt) {
    const timer = document.getElementById('game-timer');
    const old = timer.innerText;
    timer.innerText = txt;
    setTimeout(() => { if (timer.innerText === txt) timer.innerText = old; }, 1500);
}

function updateScoreUI() {
    document.getElementById('score-a').innerText = score.h;
    document.getElementById('score-b').innerText = score.v;
}

function setupInput() {
    const knob = document.getElementById('joystick-knob');
    const container = document.getElementById('joystick-container');
    const shootBtn = document.getElementById('shoot-btn');
    let active = false;

    const move = (e) => {
        if (!active) return;
        const rect = container.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        const x = t.clientX - rect.left - rect.width / 2;
        const y = t.clientY - rect.top - rect.height / 2;
        const d = Math.min(50, Math.sqrt(x * x + y * y));
        const angle = Math.atan2(y, x);
        knob.style.transform = `translate(${Math.cos(angle) * d}px, ${Math.sin(angle) * d}px)`;
        moveDir.set(Math.cos(angle) * (d / 50), Math.sin(angle) * (d / 50));
    };

    container.onmousedown = container.ontouchstart = (e) => {
        active = true;
        if (e.cancelable) e.preventDefault();
    };

    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move, { passive: false });

    const stopInput = () => {
        active = false;
        moveDir.set(0, 0);
        knob.style.transform = 'translate(0,0)';
    };

    window.addEventListener('mouseup', stopInput);
    window.addEventListener('touchend', stopInput);

    const handleShoot = (e) => {
        if (e && e.cancelable) { e.preventDefault(); e.stopPropagation(); }
        if (!isPlaying) return;
        const dist = player.position.distanceTo(ball.position);
        if (dist < 3.8) {
            disableDribbleFrames = 18;
            const power = 1.2 + (playerVelocity.length() * 0.9);
            shootBall(player, new THREE.Vector3((Math.random() - 0.5) * 6, 0, -32), power);
        }
    };

    shootBtn.addEventListener('touchstart', handleShoot, { passive: false });
    shootBtn.addEventListener('mousedown', handleShoot);
}

/** * LOGIKA FASE GUGUR */
function processResults(pH, pV, opp) {
    if (gameState.phase === 'GROUP') {
        const group = gameState.groups.find(g => g.teams.some(t => t.name === gameState.playerTeam));
        const pT = group.teams.find(t => t.name === gameState.playerTeam);
        const oT = group.teams.find(t => t.name === opp);

        pT.p++; oT.p++; pT.gf += pH; pT.ga += pV; oT.gf += pV; oT.ga += pH;
        if (pH > pV) { pT.pts += 3; pT.w++; oT.l++; }
        else if (pV > pH) { oT.pts += 3; oT.w++; pT.l++; }
        else { pT.pts++; oT.pts++; pT.d++; oT.d++; }

        group.teams.filter(t => t.name !== pT.name && t.name !== oT.name && t.p < 3).forEach(t => {
            t.p++;
            if (Math.random() > 0.5) { t.pts += 3; t.w++; t.gf += 1; } else { t.pts++; t.d++; }
        });

        if (pT.p >= 3) advanceToKnockout();
    } else {
        const phaseKey = gameState.phase.toLowerCase();
        const matches = gameState.knockout[phaseKey];
        const m = matches.find(x => x.home === gameState.playerTeam || x.away === gameState.playerTeam);
        if (m) {
            m.scoreH = pH; m.scoreV = pV;
            matches.forEach(otherMatch => {
                if (otherMatch !== m && otherMatch.scoreH === null) {
                    otherMatch.scoreH = Math.floor(Math.random() * 3);
                    otherMatch.scoreV = Math.floor(Math.random() * 3);
                    if (otherMatch.scoreH === otherMatch.scoreV) otherMatch.scoreH++;
                }
            });

            if (pH >= pV) {
                if (gameState.phase === 'QUARTER') advancePhase('SEMI');
                else if (gameState.phase === 'SEMI') advancePhase('FINAL');
                else gameState.phase = 'WINNER';
            } else {
                alert("Turnamen Berakhir! Kamu kalah di fase " + gameState.phase);
                localStorage.removeItem('ucl_tournament_save');
                location.reload();
            }
        }
    }
    saveGame();
}

function advanceToKnockout() {
    gameState.phase = 'QUARTER';
    const top = [];
    gameState.groups.forEach(g => {
        const s = [...g.teams].sort((a, b) => b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga));
        top.push(s[0].name, s[1].name);
    });
    const shuf = top.sort(() => Math.random() - 0.5);
    gameState.knockout.quarter = [];
    for (let i = 0; i < 4; i++) {
        gameState.knockout.quarter.push({ home: shuf[i * 2], away: shuf[i * 2 + 1], scoreH: null, scoreV: null });
    }
}

function advancePhase(next) {
    const prevPhase = gameState.phase.toLowerCase();
    const winners = gameState.knockout[prevPhase].map(m => m.scoreH >= m.scoreV ? m.home : m.away);
    gameState.phase = next;
    const nextKey = next.toLowerCase();
    gameState.knockout[nextKey] = [];
    for (let i = 0; i < winners.length / 2; i++) {
        gameState.knockout[nextKey].push({
            home: winners[i * 2],
            away: winners[i * 2 + 1],
            scoreH: null,
            scoreV: null
        });
    }
}

document.getElementById('start-btn').onclick = () => {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('tournament-ui').classList.remove('hidden');
    initTournament();
    renderTournamentUI();
};

document.getElementById('play-match-btn').onclick = () => {
    let opp = null;
    if (gameState.phase === 'GROUP') {
        const g = gameState.groups.find(x => x.teams.some(t => t.name === gameState.playerTeam));
        const pT = g.teams.find(t => t.name === gameState.playerTeam);
        opp = g.teams.find(t => t.name !== gameState.playerTeam && t.p < pT.p)?.name;
        if (!opp) opp = g.teams.find(t => t.name !== gameState.playerTeam && t.p < 3)?.name;
    } else if (gameState.phase !== 'WINNER') {
        const matches = gameState.knockout[gameState.phase.toLowerCase()] || [];
        const m = matches.find(x => (x.home === gameState.playerTeam || x.away === gameState.playerTeam) && x.scoreH === null);
        if (m) opp = m.home === gameState.playerTeam ? m.away : m.home;
    }

    if (!opp) {
        renderTournamentUI();
        alert("Tidak ada jadwal pertandingan tersisa untuk fase ini. Cek tabel di atas.");
        return;
    }

    currentOpponentTeam = opp;
    isPlaying = false;
    moveDir.set(0, 0);
    playerVelocity.set(0, 0, 0);
    aiVelocity.set(0, 0, 0);

    document.getElementById('tournament-ui').classList.add('hidden');
    document.getElementById('game-hud').classList.remove('hidden');
    document.getElementById('mobile-controls').classList.remove('hidden');

    isBossMatch = (opp === "Real Madrid");

    // Remove old opponent and create new with correct team colors
    scene.remove(opponent);
    opponent = createChar(opp, isBossMatch, false);

    // Set player team name in HUD
    document.getElementById('team-a-name').innerText = gameState.playerTeam;
    document.getElementById('logo-a').src = getTeamLogo(gameState.playerTeam);
    document.getElementById('logo-b').src = getTeamLogo(opp);
    document.getElementById('logo-a').style.display = 'block';
    document.getElementById('logo-b').style.display = 'block';

    if (isBossMatch) {
        const warning = document.getElementById('boss-warning');
        warning.style.opacity = '1';
        setTimeout(() => { warning.style.opacity = '0'; }, 3000);
    }

    document.getElementById('team-b-name').innerText = isBossMatch ? "CR7 (MADRID)" : opp;
    score = { h: 0, v: 0 };
    updateScoreUI();
    gameTime = 45;
    resetPositions();
    setTimeout(() => { isPlaying = true; }, 400);
};

function endGame() {
    isPlaying = false;
    document.getElementById('game-hud').classList.add('hidden');
    document.getElementById('mobile-controls').classList.add('hidden');
    document.getElementById('match-end-overlay').classList.remove('hidden');
    const oppLabel = document.getElementById('team-b-name').innerText;
    const oppName = oppLabel === "CR7 (MADRID)" ? "Real Madrid" : oppLabel;

    document.getElementById('match-result-text').innerHTML = `
        <img class="club-logo-large" src="${getTeamLogo(gameState.playerTeam)}" onerror="this.style.display='none'">
        <span>${score.h} - ${score.v}</span>
        <img class="club-logo-large" src="${getTeamLogo(oppName)}" onerror="this.style.display='none'">
    `;
    processResults(score.h, score.v, oppName);
}

document.getElementById('back-to-tournament-btn').onclick = () => {
    document.getElementById('match-end-overlay').classList.add('hidden');
    document.getElementById('tournament-ui').classList.remove('hidden');
    renderTournamentUI();
};

document.getElementById('reset-btn').onclick = () => {
    if (confirm("Hapus semua progres?")) {
        localStorage.removeItem('ucl_tournament_save');
        location.reload();
    }
};

window.onload = () => { init3D(); setupInput(); };
window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
